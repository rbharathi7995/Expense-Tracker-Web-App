<!DOCTYPE html>
<html>
    <title>EXPENSE TRACKER</title>
    <head>
         
        <link rel="stylesheet" href="styles/expense.css">
    </head>


    <body> 
      <h1>Expense Tracker</h1>
      <div>
        <input class="salary-bar js-salary-bar" type="text" placeholder="Enter your Salary">
        <button class="ok-button js-ok-button">OK</button>
        <div class="money-info">
          <span class="salary">Your Salary =</span>
           <span class="actual-money js-actual-money"></span>
        </div>
      </div>
    <div class="input-info ">
            <input class="task-name js-task-name" type="text" placeholder="Enter your spending task">  
            <input class="task-price js-task-price" type="text" placeholder="Enter spending Amount">
            <button class="add-button js-add-button">Add</button>
       </div>
      
      
        <div class="tracker-container js-tracker-container"></div>
    <script type="module" src="scripts/expense.js"></script>

    
    </body>

   
</html>
